<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Menacing fire penguin">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#220404"/>
      <stop offset="55%" stop-color="#0c0101"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#330000"/>
      <stop offset="30%" stop-color="#b3000f"/>
      <stop offset="65%" stop-color="#ff1d1d"/>
      <stop offset="100%" stop-color="#ff6a3c"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="45%" stop-color="#cc0010"/>
      <stop offset="100%" stop-color="#ff3a2a"/>
    </linearGradient>
    <linearGradient id="gflame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#021a02"/>
      <stop offset="50%" stop-color="#0fb01f"/>
      <stop offset="100%" stop-color="#4dff6e"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181b1f"/>
      <stop offset="100%" stop-color="#040506"/>
    </linearGradient>
    <filter id="glowR" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowG" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- BIG FIRE rising behind & around the penguin -->
  <g filter="url(#fireGlow)">
    <!-- back wall of flame -->
    <path fill="url(#flame2)" opacity="0.9" d="M256 500c-120 0-176-50-176-126 0-58 40-92 50-150 16 40 22 54 38 72-8-54 6-104 44-140-10 60 16 88 36 124 8-46 2-78-12-116 54 34 86 86 86 156 0 16-6 32-14 46 18-12 30-30 34-56 22 36 22 76 22 104 0 76-58 126-176 126z"/>
    <!-- left tongue -->
    <path fill="url(#flame)" d="M150 470c-30-30-40-72-30-118 14 24 20 32 32 42-8-44 4-84 30-112-6 48 16 70 30 100 4-30-2-54-12-80-2 0 36 40 40 96 6 78-72 128-120 172z" opacity="0"/>
    <path fill="url(#flame)" d="M168 478c-44-20-70-58-64-110 4-40 30-66 34-110 14 36 20 48 34 64-8-48 8-92 40-120-8 56 18 82 34 112 4-40-2-70-16-104 46 30 74 70 74 122 0 84-86 132-170 246z" opacity="0"/>
    <!-- visible left + right flame tongues that frame the body -->
    <path fill="url(#flame)" d="M178 472c-38-22-58-58-52-104 12 22 18 30 30 40-8-42 4-80 28-108-6 46 14 66 28 96 4-32-2-56-12-84 38 26 60 64 60 112 0 0-22 80-110 148z" opacity="0"/>
    <path fill="url(#flame)" d="M150 460c-26-28-34-66-24-108 12 24 18 32 30 42-6-40 6-76 30-102-6 44 16 64 28 92 4-30-2-52-12-78 36 26 56 62 56 108 0 50-90 90-136 146z" opacity="0"/>
  </g>

  <!-- clean framing flames (left & right of the penguin) -->
  <g filter="url(#fireGlow)">
    <path fill="url(#flame)" d="M196 486c-46-16-78-50-82-100-3-40 22-70 22-112 16 34 22 46 38 60-10-48 4-92 34-120-8 56 16 84 34 112-44 28-70 70-72 116-1 26 4 32-6 44z"/>
    <path fill="url(#flame)" d="M316 486c46-16 78-50 82-100 3-40-22-70-22-112-16 34-22 46-38 60 10-48-4-92-34-120 8 56-16 84-34 112 44 28 70 70 72 116 1 26-4 32 6 44z"/>
  </g>
  <!-- green plasma licks rising -->
  <g filter="url(#glowG)" opacity="0.92">
    <path fill="url(#gflame)" d="M150 420c-10-30-6-54-16-78-6 22-2 46 2 66-14-16-16-40-12-60-18 26-10 60 0 86 12 32 26 22 26 22z"/>
    <path fill="url(#gflame)" d="M362 420c10-30 6-54 16-78 6 22 2 46-2 66 14-16 16-40 12-60 18 26 10 60 0 86-12 32-26 22-26 22z"/>
    <path fill="url(#gflame)" opacity="0.8" d="M256 150c8-22 18-34 12-58 16 22 12 52 4 74 14-14 16-34 14-52 18 22 14 56 6 78-10 28-28 30-28 30s-30-2-40-30c-8-22 22-90 32-112z"/>
  </g>

  <!-- PENGUIN -->
  <g>
    <path filter="url(#glowG)" fill="#0c4f17" opacity="0.5" d="M256 110c50 0 86 42 90 100 4 60-4 124-22 166-13 32-38 50-68 50s-55-18-68-50c-18-42-26-106-22-166 4-58 40-100 90-100z"/>
    <path fill="#060708" stroke="#239030" stroke-width="2" d="M256 114c48 0 82 40 86 96 4 58-4 122-22 162-12 30-36 47-64 47s-52-17-64-47c-18-40-26-104-22-162 4-56 38-96 86-96z"/>
    <path fill="url(#belly)" d="M256 178c24 0 40 26 42 62 2 38-2 80-14 106-7 16-17 25-28 25s-21-9-28-25c-12-26-16-68-14-106 2-36 18-62 42-62z"/>
    <path fill="#040506" d="M202 196c20-20 42-28 54-28s34 8 54 28c-17-8-36-12-54-12s-37 4-54 12z"/>
    <g filter="url(#glowR)">
      <path fill="#ff1414" d="M218 202l32 14-6 22-30-16z"/>
      <path fill="#ff1414" d="M294 202l-32 14 6 22 30-16z"/>
      <circle cx="231" cy="218" r="4.5" fill="#ffe0e0"/>
      <circle cx="281" cy="218" r="4.5" fill="#ffe0e0"/>
    </g>
    <path fill="#cc0010" stroke="#4dff6e" stroke-width="1.2" d="M256 228l20 13-20 28-20-28z"/>
    <path fill="#7a000a" d="M256 243l11 7-11 17-11-17z"/>
    <path fill="#050607" stroke="#239030" stroke-width="1.4" d="M174 256c-20 16-30 46-26 80 13-13 22-20 35-26-9 22-11 40-7 58 15-28 26-42 41-53-17-40-29-80-43-59z"/>
    <path fill="#050607" stroke="#239030" stroke-width="1.4" d="M338 256c20 16 30 46 26 80-13-13-22-20-35-26 9 22 11 40 7 58-15-28-26-42-41-53 17-40 29-80 43-59z"/>
    <path fill="#cc0010" d="M218 440l-12 24 16-4 5-13zM242 446l-5 22 13-2 1-16zM294 440l12 24-16-4-5-13zM270 446l5 22-13-2-1-16z"/>
  </g>
</svg>
