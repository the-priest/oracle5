<?xml version="1.0" encoding="UTF-8"?>
<!--
  Kali assistant icon.  Original geometric dragon-head mark - my own
  stylised interpretation in the Kali blue palette, NOT a copy of the
  official Kali Linux dragon (which is OffSec's trademark).  Blue mark
  on a rounded near-black tile so it reads as a deliberate first-party
  tool icon on any panel.  To use a different icon, overwrite this file
  in place; the .desktop entry resolves it by the theme name
  "org.thepriest.kali".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">

  <defs>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#5aa7ff"/>
      <stop offset="0.55" stop-color="#367bf0"/>
      <stop offset="1"    stop-color="#2563d6"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#367bf0" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#367bf0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="52" ry="52" fill="#0d0f12"/>
  <rect x="8" y="8" width="240" height="240" rx="52" ry="52" fill="url(#halo)"/>
  <rect x="9" y="9" width="238" height="238" rx="51" ry="51"
        fill="none" stroke="#262b33" stroke-width="2"/>
  <rect x="9" y="9" width="238" height="238" rx="51" ry="51"
        fill="none" stroke="#367bf0" stroke-width="1" stroke-opacity="0.35"/>

  <g fill="url(#blade)" fill-rule="evenodd"
     stroke="#7dc0ff" stroke-width="0.6" stroke-opacity="0.5">

